<div class="glass-card p-4 mb-4">
    <div class="d-flex justify-content-between
                align-items-center mb-3">
        <h6 class="mb-0" style="color:var(--text-muted);">
            Checkout
        </h6>
        <span class="text-accent fw-600">
            Step {{ step }} of 2
        </span>
    </div>
    <div class="onboard-progress mb-3">
        <div class="onboard-bar"
             style="width:{% if step == 1 %}50{% else %}100{% endif %}%;">
        </div>
    </div>
    <div class="d-flex justify-content-between px-1">
        <span class="progress-label
            {% if step >= 1 %}done{% endif %}">
            Delivery Address
        </span>
        <span class="progress-label
            {% if step >= 2 %}done{% endif %}">
            Payment
        </span>
    </div>
</div>
